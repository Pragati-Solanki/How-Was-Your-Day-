<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How Was Your Day?</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e7,#d7f7ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,.15);
text-align:center;
max-width:700px;
width:90%;
animation:fade .8s;
}

h1{
font-size:2.2rem;
margin-bottom:15px;
}

p{
font-size:1.2rem;
margin-bottom:25px;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:50px;
cursor:pointer;
transition:.3s;
}

.yes{
background:#50d890;
color:white;
}

.no{
background:#ff6b6b;
color:white;
}

button:hover{
transform:scale(1.08);
}

img{
width:320px;
border-radius:20px;
margin:20px 0;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

iframe{
width:100%;
height:350px;
border:none;
border-radius:20px;
margin-top:20px;
}

.hidden{
display:none;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div class="container">

<div id="question">

<h1>🐱 How Was Your Day?</h1>

<p>Did you have a good day today?</p>

<div class="buttons">
<button class="yes" onclick="goodDay()">😊 Yes</button>
<button class="no" onclick="badDay()">😢 No</button>
</div>

</div>

<div id="result"></div>

</div>

<script>

const cats=[
"https://cataas.com/cat/cute",
"https://cataas.com/cat?width=400",
"https://cataas.com/cat/says/Yay!"
];

function randomCat(){
return cats[Math.floor(Math.random()*cats.length)];
}

function goodDay(){

localStorage.setItem("mood","good");

document.getElementById("question").classList.add("hidden");

document.getElementById("result").innerHTML=`
<h1>🎉 Yay!!</h1>

<p>I'm so happy you had an amazing day ❤️</p>

<img src="${randomCat()}" alt="Happy Cat">

<br><br>

<button onclick="resetApp()">Ask Again</button>
`;

confetti();
}

function badDay(){

localStorage.setItem("mood","bad");

document.getElementById("question").classList.add("hidden");

document.getElementById("result").innerHTML=`

<h1>🦆 Sending Duck Therapy...</h1>

<p>I'm sorry today wasn't great.<br>Hopefully these dancing ducks cheer you up 💛</p>

<iframe
    width="100%"
    height="350"
    src="https://www.youtube.com/embed/NKXHQpqgF4w?autoplay=1&mute=1&rel=0"
    title="Dancing Ducks"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen>
</iframe>

<br><br>

<button onclick="resetApp()">Ask Again</button>

`;

}

function resetApp(){

localStorage.removeItem("mood");

document.getElementById("question").classList.remove("hidden");

document.getElementById("result").innerHTML="";
}

window.onload=function(){

let mood=localStorage.getItem("mood");

if(mood==="good") goodDay();

if(mood==="bad") badDay();

}

function confetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div");

c.innerHTML="🎉";

c.style.position="fixed";

c.style.left=Math.random()*100+"vw";

c.style.top="-30px";

c.style.fontSize=(20+Math.random()*20)+"px";

c.style.transition="4s linear";

document.body.appendChild(c);

setTimeout(()=>{
c.style.top="110vh";
},100);

setTimeout(()=>{
c.remove();
},4500);

}

}

</script>

</body>
</html>
